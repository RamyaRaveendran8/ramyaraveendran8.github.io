<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Class Quiz</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0 20px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: #0056b3; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin-bottom: 10px; }
        button:hover { background-color: #004494; }
        .option-btn { background-color: #e9ecef; color: #333; text-align: left; }
        .option-btn:active { background-color: #d3d9df; }
        #timer-display { font-size: 24px; font-weight: bold; color: #d9534f; text-align: center; margin-bottom: 15px; }
        .hidden { display: none; }
        #question-text { font-size: 18px; font-weight: bold; margin-bottom: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container" id="login-screen">
    <h2>Student Login</h2>
    <p>Please enter your details to begin the quiz. The timer will start immediately.</p>
    <input type="text" id="student-name" placeholder="Full Name" required>
    <input type="text" id="student-id" placeholder="Student ID / Roll No." required>
    <button onclick="startQuiz()">Start Quiz</button>
</div>

<div class="container hidden" id="quiz-screen">
    <div id="timer-display">Time: <span id="time-left">15</span>s</div>
    <div id="question-text">Loading question...</div>
    <button class="option-btn" id="btn-a" onclick="selectOption('a')"></button>
    <button class="option-btn" id="btn-b" onclick="selectOption('b')"></button>
    <button class="option-btn" id="btn-c" onclick="selectOption('c')"></button>
    <button class="option-btn" id="btn-d" onclick="selectOption('d')"></button>
</div>

<div class="container hidden" id="result-screen">
    <h2>Quiz Complete</h2>
    <p id="final-message">Submitting your score...</p>
</div>

<script>
    // --- CONFIGURATION ---
    // PASTE YOUR GOOGLE SCRIPT URL HERE:
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxHq77043opSQZfGMsoFlyhzqRm4xyTSY2ItsUSR-KSQYfiXJl3SZQ5YETImiy3DfKW/exec"; 
    const TIME_PER_QUESTION = 15; // Set to 10-20 seconds as requested

    // --- VARIABLES ---
    let questions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let timerInterval;
    let studentData = {};
    let quizId = "unknown_quiz";

    // --- INITIALIZATION ---
    window.onload = function() {
        // Get the quiz ID from the URL (e.g., ?id=DM_Quiz_1)
        const urlParams = new URLSearchParams(window.location.search);
        const idFromUrl = urlParams.get('id');
        
        if (!idFromUrl) {
            alert("Error: No quiz ID found in the link. Please use the correct link.");
            return;
        }
        quizId = idFromUrl;
        
        // Fetch the corresponding JSON file
        fetch(quizId + '.json')
            .then(response => {
                if (!response.ok) throw new Error("Could not find the question bank.");
                return response.json();
            })
            .then(data => {
                questions = data;
            })
            .catch(error => {
                alert("Error loading questions. Check your URL or JSON file name.");
            });
    };

    function startQuiz() {
        const nameInput = document.getElementById('student-name').value.trim();
        const idInput = document.getElementById('student-id').value.trim();

        if (nameInput === "" || idInput === "") {
            alert("Please enter both Name and Student ID.");
            return;
        }

        if (questions.length === 0) {
            alert("Questions are still loading or failed to load. Please wait a moment.");
            return;
        }

        studentData.name = nameInput;
        studentData.studentId = idInput;

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');

        shuffleArray(questions);
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= questions.length) {
            finishQuiz();
            return;
        }

        const currentQ = questions[currentQuestionIndex];
        document.getElementById('question-text').innerText = `Q${currentQuestionIndex + 1}: ${currentQ.question}`;
        document.getElementById('btn-a').innerText = `A) ${currentQ.a}`;
        document.getElementById('btn-b').innerText = `B) ${currentQ.b}`;
        document.getElementById('btn-c').innerText = `C) ${currentQ.c}`;
        document.getElementById('btn-d').innerText = `D) ${currentQ.d}`;

        startTimer();
    }

    function startTimer() {
        let timeLeft = TIME_PER_QUESTION;
        document.getElementById('time-left').innerText = timeLeft;
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time-left').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                nextQuestion(false); // Move to next question, no score awarded
            }
        }, 1000);
    }

    function selectOption(selectedLetter) {
        clearInterval(timerInterval);
        const correctLetter = questions[currentQuestionIndex].correct;
        
        if (selectedLetter === correctLetter) {
            score++;
        }
        nextQuestion();
    }

    function nextQuestion() {
        currentQuestionIndex++;
        loadQuestion();
    }

    function finishQuiz() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        const payload = {
            quizId: quizId,
            name: studentData.name,
            studentId: studentData.studentId,
            score: score
        };

        // Send data to Google Sheets silently
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // Prevents browser security blocks when sending simple data
            body: JSON.stringify(payload)
        }).then(() => {
            document.getElementById('final-message').innerText = `Your score of ${score}/${questions.length} has been successfully submitted. You may close this window.`;
        }).catch(error => {
            document.getElementById('final-message').innerText = `An error occurred while submitting. Please tell your instructor. Score: ${score}/${questions.length}`;
        });
    }

    // Utility function to randomize the question order
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
</script>

</body>
</html>
